services:
  graphite:
    image: graphiteapp/graphite-statsd:1.1.10-5
    container_name: graphite_$USER
    ports:
      - 8080:80
      - 2003:2003
      - 8125:8125/udp
      - 8126:8126
    volumes:
      - ./statsd/config.js:/opt/statsd/config.js

  mlflow_example:
    build:
      context: ./
      dockerfile: ./Dockerfile
    image: ml_service:$USER
    container_name: ml_service_$USER
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - 1488:8890
    environment:
      - MLFLOW_TRACKING_URI=http://158.160.2.37:5000/
      - DEFAULT_RUN_ID=${DEFAULT_RUN_ID}
      - STATSD_HOST=graphite
      - STATSD_PORT=8125
      - STATSD_PREFIX=ml_service
    depends_on:
      - graphite
    command: uvicorn main:app --host 0.0.0.0 --port 8890
